<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="prFlTitle prFlDesc">
  <title id="prFlTitle">The PipeRocket SaaS SEO framework, four choices</title>
  <desc id="prFlDesc">At every step the framework makes a contrarian choice and turns search intent into pipeline. 01 Buyers over keywords: who buys and how they search comes first. 02 Intent over volume: decision-stage searches that convert in weeks. 03 Purpose over publish: high-converting comparison and alternative pages shipped in month one. 04 Revenue over rankings: the CTA and MQL path is built in before a word is written. Search intent goes in, qualified pipeline and MRR come out.</desc>

  <text x="600" y="28" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#0CC6F1">AT EVERY STEP, WE CHOOSE</text>

  <!-- forward chevrons between steps -->
  <g fill="none" stroke="#0CC6F1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 326 84 l 12 9 l -12 9"/>
    <path d="M 591 84 l 12 9 l -12 9"/>
    <path d="M 866 84 l 12 9 l -12 9"/>
  </g>

  <!-- ===== four steps ===== -->
  <g text-anchor="middle">
    <!-- 01 Buyers -->
    <text x="195" y="58" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">01</text>
    <text x="195" y="101" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#0D0D0D">Buyers</text>
    <text x="195" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="13.5" font-style="italic" fill="#9a9a96">not <tspan fill="#6B6B6B">keywords</tspan></text>
    <line x1="186" y1="120" x2="231" y2="117.5" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
    <text x="195" y="152" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">Who buys and how</text>
    <text x="195" y="169" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">they search comes first</text>

    <!-- 02 Intent -->
    <text x="465" y="58" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">02</text>
    <text x="465" y="101" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#0D0D0D">Intent</text>
    <text x="465" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="13.5" font-style="italic" fill="#9a9a96">not <tspan fill="#6B6B6B">volume</tspan></text>
    <line x1="458" y1="120" x2="497" y2="117.5" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
    <text x="465" y="152" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">Decision-stage searches</text>
    <text x="465" y="169" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">that convert in weeks</text>

    <!-- 03 Purpose -->
    <text x="735" y="58" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">03</text>
    <text x="735" y="101" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#0D0D0D">Purpose</text>
    <text x="735" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="13.5" font-style="italic" fill="#9a9a96">not <tspan fill="#6B6B6B">publish</tspan></text>
    <line x1="728" y1="120" x2="767" y2="117.5" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
    <text x="735" y="152" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">High-converting pages</text>
    <text x="735" y="169" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">shipped in month one</text>

    <!-- 04 Revenue -->
    <text x="1005" y="58" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">04</text>
    <text x="1005" y="101" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#0D0D0D">Revenue</text>
    <text x="1005" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="13.5" font-style="italic" fill="#9a9a96">not <tspan fill="#6B6B6B">rankings</tspan></text>
    <line x1="998" y1="120" x2="1037" y2="117.5" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
    <text x="1005" y="152" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">CTA + MQL path baked</text>
    <text x="1005" y="169" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">in before we write</text>
  </g>

  <!-- search intent -> pipeline flow rail -->
  <line x1="150" y1="222" x2="1038" y2="222" stroke="#0D0D0D" stroke-width="1.6" stroke-dasharray="2 7" stroke-linecap="round" opacity="0.5"/>
  <path d="M 1050 222 l -12 -6 M 1050 222 l -12 6" fill="none" stroke="#0D0D0D" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <text x="150" y="244" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#6B6B6B">SEARCH INTENT IN</text>
  <text x="1050" y="244" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#0D0D0D">QUALIFIED PIPELINE &amp; MRR OUT</text>
  <path d="M 905 250 q 75 7 145 0" fill="none" stroke="#E63946" stroke-width="2.6" stroke-linecap="round"/>
</svg>
