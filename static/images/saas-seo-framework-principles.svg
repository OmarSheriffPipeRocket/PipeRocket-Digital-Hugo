<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="prFpTitle prFpDesc">
  <title id="prFpTitle">PipeRocket SaaS SEO framework principles</title>
  <desc id="prFpDesc">Four principles on a timeline: buyers over keywords, intent over volume, purpose over publish, revenue over rankings.</desc>

  <!-- horizontal rail -->
  <line x1="46" y1="170" x2="1154" y2="170" stroke="#c9c6bf" stroke-width="2"/>

  <!-- signature red/blue chevron marker, pointing right, at rail center -->
  <g transform="translate(600 170) rotate(-90) scale(0.8) translate(-29 -28.5)">
    <path fill="#0ba6e2" d="m28.475 55.92 14.258-13.615c.217-.208.347-.498.35-.799l.271-27.4c.01-.99-1.18-1.506-1.896-.822l-13.35 12.748L16.94 14.336c-.684-.716-1.897-.256-1.932.733l-.993 27.375c-.012.302.1.593.312.815l12.039 12.607c.572.6 1.518.617 2.114.049z"/>
    <path fill="#ff0025" d="M28.108 26.031 16.941 14.336c-1.59-1.336-2.578-.074-2.613.915l-.313 27.193c-.011.301.101.592.313.814l12.038 12.607c.572.6 1.52.617 2.114.05L42.738 42.3c.217-.207.495-.647.142-1.016"/>
  </g>

  <!-- connector ticks -->
  <line x1="190" y1="148" x2="190" y2="170" stroke="#c9c6bf" stroke-width="2"/>
  <line x1="480" y1="192" x2="480" y2="170" stroke="#c9c6bf" stroke-width="2"/>
  <line x1="770" y1="148" x2="770" y2="170" stroke="#c9c6bf" stroke-width="2"/>
  <line x1="1050" y1="192" x2="1050" y2="170" stroke="#c9c6bf" stroke-width="2"/>

  <!-- card 1: Buyers over keywords (above rail) -->
  <g>
    <rect x="60" y="28" width="260" height="120" fill="none" stroke="#c9c6bf" stroke-width="3"/>
    <g stroke="#FC6B7E" stroke-width="2.2" fill="none" stroke-linecap="round">
      <circle cx="94" cy="49" r="6"/>
      <path d="M 82 66 q 12 -10 24 0"/>
    </g>
    <text x="80" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0D0D0D">Buyers over keywords</text>
    <text x="80" y="115" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">The keyword list comes out of buyer</text>
    <text x="80" y="132" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">conversations, not a tool export.</text>
  </g>

  <!-- card 2: Intent over volume (below rail) -->
  <g>
    <rect x="350" y="192" width="260" height="120" fill="none" stroke="#c9c6bf" stroke-width="3"/>
    <g stroke="#FC6B7E" stroke-width="2.2" fill="none" stroke-linecap="round">
      <circle cx="384" cy="215" r="7"/>
      <path d="M 381 226 h 6 M 382 230 h 4"/>
      <path d="M 384 202 v -3 M 374 206 l -2 -2 M 394 206 l 2 -2"/>
    </g>
    <text x="370" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0D0D0D">Intent over volume</text>
    <text x="370" y="279" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">Decision-stage searches first.</text>
    <text x="370" y="296" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">Lower volume, higher conversion.</text>
  </g>

  <!-- card 3: Purpose over publish (above rail) -->
  <g>
    <rect x="640" y="28" width="260" height="120" fill="none" stroke="#c9c6bf" stroke-width="3"/>
    <g stroke="#FC6B7E" stroke-width="2.2" fill="none" stroke-linecap="round">
      <circle cx="674" cy="52" r="10"/>
      <circle cx="674" cy="52" r="4.5"/>
      <circle cx="674" cy="52" r="0.8" fill="#FC6B7E"/>
    </g>
    <text x="660" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0D0D0D">Purpose over publish</text>
    <text x="660" y="115" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">Comparison and alternative pages</text>
    <text x="660" y="132" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">ship in month one.</text>
  </g>

  <!-- card 4: Revenue over rankings (below rail, destination card) -->
  <g>
    <rect x="930" y="192" width="260" height="120" fill="none" stroke="#82C6DD" stroke-width="3.5"/>
    <g stroke="#FC6B7E" stroke-width="2.2" fill="none" stroke-linecap="round">
      <circle cx="964" cy="216" r="10"/>
    </g>
    <text x="964" y="221.5" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FC6B7E">$</text>
    <text x="948" y="256" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#0D0D0D">Revenue over rankings</text>
    <text x="950" y="279" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">CTA logic and the MQL path built in</text>
    <text x="950" y="296" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">before a word is written.</text>
  </g>
</svg>
