<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="100%" role="img" aria-label="Bar chart of year-over-year growth comparing April 2025 to March 2026 against April 2024 to March 2025: organic and direct sessions up 25 percent, users up 27 percent, new users up 33 percent.">
  <title>Organic + direct growth, year over year</title>
  <desc>Comparing Apr 2025 – Mar 2026 against Apr 2024 – Mar 2025: sessions grew 25%, users grew 27%, new users grew 33%. AI-search traffic grew 166% over the same period.</desc>

  <!-- title + period -->
  <text x="60" y="26" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#020617">Organic + direct growth, year over year</text>
  <text x="60" y="48" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#6b7280">Apr 2025 – Mar 2026 vs Apr 2024 – Mar 2025</text>

  <!-- gridlines + y labels (%) -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#9aa0a6">
    <line x1="120" y1="320" x2="700" y2="320" stroke="#cfcabd" stroke-width="1.5"/>
    <line x1="120" y1="260" x2="700" y2="260" stroke="#f0eee8" stroke-width="1"/>
    <line x1="120" y1="200" x2="700" y2="200" stroke="#f0eee8" stroke-width="1"/>
    <line x1="120" y1="140" x2="700" y2="140" stroke="#f0eee8" stroke-width="1"/>
    <line x1="120" y1="80" x2="700" y2="80" stroke="#f0eee8" stroke-width="1"/>
    <text x="112" y="324" text-anchor="end">0</text>
    <text x="112" y="264" text-anchor="end">+10%</text>
    <text x="112" y="204" text-anchor="end">+20%</text>
    <text x="112" y="144" text-anchor="end">+30%</text>
    <text x="112" y="84" text-anchor="end">+40%</text>
  </g>

  <!-- bars -->
  <rect x="170" y="170" width="100" height="150" fill="#0BA6E2"/>
  <rect x="350" y="158" width="100" height="162" fill="#0BA6E2"/>
  <rect x="530" y="122" width="100" height="198" fill="#0BA6E2"/>

  <!-- value labels -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#0A6E96" text-anchor="middle">
    <text x="220" y="162">+25%</text>
    <text x="400" y="150">+27%</text>
    <text x="580" y="114">+33%</text>
  </g>

  <!-- x labels -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#020617" text-anchor="middle">
    <text x="220" y="342">Sessions</text>
    <text x="400" y="342">Users</text>
    <text x="580" y="342">New users</text>
  </g>
  <text x="410" y="374" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#9aa0a6">AI-search traffic grew +166% over the same period.</text>
</svg>
