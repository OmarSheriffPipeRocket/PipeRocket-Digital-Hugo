<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-p90 desc-p90" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" viewBox="0 0 1200 720"><title>The 90-Day Pilot Roadmap — PipeRocket Digital</title><desc>What happens each month during PipeRocket Digital&apos;s 90-day pilot. Month 1: foundation work — ICP audit, tech audit, BOFU keyword map. Month 2: compounding — comparison pages, hub-and-spoke cluster, digital PR. Month 3: pipeline — AI search optimisation, CRO experiments, quarterly board-ready dashboard.</desc><path fill="#f6f6f1" d="M0 0h1200v720H0z"/><g transform="translate(50 70)"><rect width="220" height="26" fill="rgba(12,198,241,0.15)" rx="4"/><text x="14" y="18" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="2">PIPEROCKET DIGITAL · 3-MONTH PILOT</text><text y="68" fill="#0d0d0d" font-family="'IvyPresto Headline', Georgia, serif" font-size="30" font-weight="700">The 90-Day Pilot Roadmap</text><text y="100" fill="#1a1a1a" font-size="14">What happens each month when you ship a real pipeline pilot — not &quot;deliverables&quot;, outcomes.</text></g><path stroke="#d9d5c9" d="M50 200h1100"/><path stroke="#d9d5c9" stroke-width="2" d="M160 265h880"/><circle cx="240" cy="265" r="9" fill="#0cc6f1"/><circle cx="600" cy="265" r="9" fill="#0cc6f1"/><circle cx="960" cy="265" r="9" fill="#0cc6f1"/><g transform="translate(60 290)"><rect width="360" height="370" fill="#fff" stroke="#d9d5c9" rx="14"/><rect width="48" height="4" fill="#0cc6f1" rx="2" transform="translate(22 36)"/><text x="22" y="68" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="2">MONTH 1</text><text x="22" y="100" fill="#0d0d0d" font-family="'IvyPresto Headline', Georgia, serif" font-size="22" font-weight="700">Foundation</text><text x="22" y="124" fill="#6b6b6b" font-size="12" font-style="italic">Goal: rule out the wrong bets</text><path stroke="#d9d5c9" d="M22 146h316"/><text x="22" y="178" fill="#1a1a1a" font-size="13" font-weight="700">What we ship</text><text x="22" y="203" fill="#3f3f3f" font-size="13">· ICP audit from closed-won data</text><text x="22" y="226" fill="#3f3f3f" font-size="13">· Technical audit (crawl, schema, render)</text><text x="22" y="249" fill="#3f3f3f" font-size="13">· BOFU keyword map by buyer stage</text><text x="22" y="272" fill="#3f3f3f" font-size="13">· Editorial calendar — 90 days locked</text><path stroke="#d9d5c9" d="M22 298h316"/><text x="22" y="326" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="1.5">DAY-30 MILESTONE</text><text x="22" y="352" fill="#0d0d0d" font-size="14" font-weight="600">First 3 BOFU pages live.</text></g><g transform="translate(420 290)"><rect width="360" height="370" fill="#e8e4da" stroke="#0cc6f1" stroke-width="1.5" rx="14"/><rect width="48" height="4" fill="#0cc6f1" rx="2" transform="translate(22 36)"/><text x="22" y="68" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="2">MONTH 2</text><text x="22" y="100" fill="#0d0d0d" font-family="'IvyPresto Headline', Georgia, serif" font-size="22" font-weight="700">Compounding</text><text x="22" y="124" fill="#6b6b6b" font-size="12" font-style="italic">Goal: stack pages that compound</text><path stroke="#d9d5c9" d="M22 146h316"/><text x="22" y="178" fill="#1a1a1a" font-size="13" font-weight="700">What we ship</text><text x="22" y="203" fill="#3f3f3f" font-size="13">· Comparison + alternatives pages (5+)</text><text x="22" y="226" fill="#3f3f3f" font-size="13">· Hub-and-spoke content cluster live</text><text x="22" y="249" fill="#3f3f3f" font-size="13">· Digital PR pitches (3+ to target press)</text><text x="22" y="272" fill="#3f3f3f" font-size="13">· CRM attribution wired in</text><path stroke="#d9d5c9" d="M22 298h316"/><text x="22" y="326" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="1.5">DAY-60 MILESTONE</text><text x="22" y="352" fill="#0d0d0d" font-size="14" font-weight="600">First MQLs from new pages.</text></g><g transform="translate(780 290)"><rect width="360" height="370" fill="#fff" stroke="#d9d5c9" rx="14"/><rect width="48" height="4" fill="#0cc6f1" rx="2" transform="translate(22 36)"/><text x="22" y="68" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="2">MONTH 3</text><text x="22" y="100" fill="#0d0d0d" font-family="'IvyPresto Headline', Georgia, serif" font-size="22" font-weight="700">Pipeline</text><text x="22" y="124" fill="#6b6b6b" font-size="12" font-style="italic">Goal: a number the board can defend</text><path stroke="#d9d5c9" d="M22 146h316"/><text x="22" y="178" fill="#1a1a1a" font-size="13" font-weight="700">What we ship</text><text x="22" y="203" fill="#3f3f3f" font-size="13">· AI search / Overviews optimisation</text><text x="22" y="226" fill="#3f3f3f" font-size="13">· CRO experiments on top BOFU pages</text><text x="22" y="249" fill="#3f3f3f" font-size="13">· Pricing / demo-form A/B tests</text><text x="22" y="272" fill="#3f3f3f" font-size="13">· Board-ready pipeline dashboard</text><path stroke="#d9d5c9" d="M22 298h316"/><text x="22" y="326" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="1.5">DAY-90 MILESTONE</text><text x="22" y="352" fill="#0d0d0d" font-size="14" font-weight="600">Closed-won attribution reportable.</text></g><g transform="translate(60 680)"><rect width="1080" height="32" fill="rgba(12,198,241,0.10)" rx="6"/><text x="22" y="22" fill="#0d0d0d" font-size="13"><tspan fill="#0cc6f1" font-weight="700">RISK REVERSAL · </tspan>If we haven&apos;t moved the needle by day 90 — cancel any month, zero penalty, no contract trap.</text></g></svg>