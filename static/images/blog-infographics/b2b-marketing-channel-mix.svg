<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-cm desc-cm" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" viewBox="0 0 1200 720"><title>The B2B Marketing Channel Mix — PipeRocket Digital</title><desc>Seven core B2B marketing strategies arranged in a wheel around the buyer: content marketing, account-based marketing, email nurturing &amp; automation, thought leadership and social, events and webinars, paid media, and sales-marketing alignment.</desc><path fill="#f6f6f1" d="M0 0h1200v720H0z"/><path fill="#e8e4da" d="M0 0h1200v110H0z"/><text x="50" y="48" fill="#0d0d0d" font-size="12" font-weight="700" letter-spacing="2.4">PIPEROCKET DIGITAL · B2B MARKETING</text><text x="50" y="85" fill="#0d0d0d" font-size="26" font-weight="700">The B2B Marketing Channel Mix</text><path fill="#0cc6f1" d="M0 110h1200v4H0z"/><text x="50" y="148" fill="#282828" font-size="14">Seven channels that surround the buyer. Each plays a different role across the funnel.</text><g transform="translate(600 440)"><circle r="100" fill="#282828"/><text y="-12" fill="#0cc6f1" font-size="11" font-weight="700" letter-spacing="2" text-anchor="middle">CENTER OF GRAVITY</text><text y="14" fill="#0d0d0d" font-size="22" font-weight="700" text-anchor="middle">B2B Buyer</text><text y="36" fill="rgba(13, 13, 13, 0.75)" font-size="12" text-anchor="middle">CMO · Dev lead · CFO</text></g><g stroke="#282828" stroke-dasharray="4,4" stroke-width="1.5" opacity=".4"><path d="M600 440V240M600 440l220-145M600 440l330 5M600 440l220 155M600 440 380 595M600 440l-330 5M600 440 380 295"/></g><g transform="translate(478 195)"><rect width="244" height="90" fill="#fff" stroke="#0cc6f1" stroke-width="2" rx="10"/><circle cx="28" cy="28" r="16" fill="#0cc6f1"/><text x="28" y="34" fill="#0d0d0d" font-size="13" font-weight="700" text-anchor="middle">1</text><text x="56" y="32" fill="#282828" font-size="14" font-weight="700">Content Marketing</text><text x="56" y="52" fill="#3f3f3f" font-size="11">SEO, blog, pillar pages, glossary</text><text x="56" y="69" fill="#3f3f3f" font-size="11">Funnel: TOFU → BOFU</text></g><g transform="translate(770 250)"><rect width="244" height="90" fill="#fff" stroke="#d9d5c9" rx="10"/><circle cx="28" cy="28" r="16" fill="#0cc6f1"/><text x="28" y="34" fill="#0d0d0d" font-size="13" font-weight="700" text-anchor="middle">2</text><text x="56" y="32" fill="#282828" font-size="14" font-weight="700">Account-Based Marketing</text><text x="56" y="52" fill="#3f3f3f" font-size="11">Target accounts, multi-thread</text><text x="56" y="69" fill="#3f3f3f" font-size="11">Funnel: Mid → BOFU</text></g><g transform="translate(890 400)"><rect width="244" height="90" fill="#fff" stroke="#d9d5c9" rx="10"/><circle cx="28" cy="28" r="16" fill="#0cc6f1"/><text x="28" y="34" fill="#0d0d0d" font-size="13" font-weight="700" text-anchor="middle">3</text><text x="56" y="32" fill="#282828" font-size="14" font-weight="700">Email &amp; Automation</text><text x="56" y="52" fill="#3f3f3f" font-size="11">Drip nurture, lifecycle, retention</text><text x="56" y="69" fill="#3f3f3f" font-size="11">Funnel: MOFU → Retention</text></g><g transform="translate(770 555)"><rect width="244" height="90" fill="#fff" stroke="#d9d5c9" rx="10"/><circle cx="28" cy="28" r="16" fill="#0cc6f1"/><text x="28" y="34" fill="#0d0d0d" font-size="13" font-weight="700" text-anchor="middle">4</text><text x="56" y="32" fill="#282828" font-size="14" font-weight="700">Thought Leadership</text><text x="56" y="52" fill="#3f3f3f" font-size="11">Founder LinkedIn, podcasts, PR</text><text x="56" y="69" fill="#3f3f3f" font-size="11">Funnel: TOFU brand lift</text></g><g transform="translate(186 555)"><rect width="244" height="90" fill="#fff" stroke="#d9d5c9" rx="10"/><circle cx="28" cy="28" r="16" fill="#0cc6f1"/><text x="28" y="34" fill="#0d0d0d" font-size="13" font-weight="700" text-anchor="middle">5</text><text x="56" y="32" fill="#282828" font-size="14" font-weight="700">Events &amp; Webinars</text><text x="56" y="52" fill="#3f3f3f" font-size="11">Booths, dinners, live demos</text><text x="56" y="69" fill="#3f3f3f" font-size="11">Funnel: MOFU → BOFU</text></g><g transform="translate(66 400)"><rect width="244" height="90" fill="#fff" stroke="#d9d5c9" rx="10"/><circle cx="28" cy="28" r="16" fill="#0cc6f1"/><text x="28" y="34" fill="#0d0d0d" font-size="13" font-weight="700" text-anchor="middle">6</text><text x="56" y="32" fill="#282828" font-size="14" font-weight="700">Paid Media for B2B</text><text x="56" y="52" fill="#3f3f3f" font-size="11">Google Ads, LinkedIn, retargeting</text><text x="56" y="69" fill="#3f3f3f" font-size="11">Funnel: TOFU + BOFU</text></g><g transform="translate(186 250)"><rect width="244" height="90" fill="#fff" stroke="#d9d5c9" rx="10"/><circle cx="28" cy="28" r="16" fill="#0cc6f1"/><text x="28" y="34" fill="#0d0d0d" font-size="13" font-weight="700" text-anchor="middle">7</text><text x="56" y="32" fill="#282828" font-size="14" font-weight="700">Sales-Marketing Alignment</text><text x="56" y="52" fill="#3f3f3f" font-size="11">SLA, MQL → SQL handoff, CRM</text><text x="56" y="69" fill="#3f3f3f" font-size="11">Funnel: BOFU → Close</text></g><text x="1150" y="698" fill="rgba(40,40,40,0.5)" font-size="11" text-anchor="end">piperocket.digital · B2B Marketing Channel Mix</text></svg>