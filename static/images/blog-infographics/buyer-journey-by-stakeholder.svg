<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title-bj desc-bj" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
  <title id="title-bj">Buyer Journey by Stakeholder — PipeRocket Digital</title>
  <desc id="desc-bj">A grid showing how three B2B buying-committee stakeholders — CMO/marketing leader, end-user/practitioner, and CFO/finance — move through four funnel stages (Awareness, Consideration, Decision, Retention) with distinct questions, content needs, and conversion triggers.</desc>

