<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" role="img" aria-labelledby="title-2 desc-2" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
  <title id="title-2">Hub-and-Spoke Content Architecture — PipeRocket Digital</title>
  <desc id="desc-2">A diagram showing hub-and-spoke topical architecture. A central pillar page is surrounded by ten spoke articles. Each spoke links to the pillar, and the pillar links back to every spoke. The structure compounds topical authority over time.</desc>

  
  <rect width="1000" height="720" fill="#F6F6F1" />

  
  <rect x="0" y="0" width="1000" height="100" fill="#E8E4DA" stroke="#0CC6F1" stroke-width="1.5" />
