<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-ick desc-ick" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" viewBox="0 0 1200 720"><title>ICP → Keyword → Campaign Mapping — PipeRocket Digital</title><desc>A three-column flow that B2B PPC programs must build before spending a dollar: ICP profile (industry, role, stage) drives keyword intent classification (awareness, consideration, decision), which drives the campaign structure (brand, competitor, non-brand) and the offer on each landing page.</desc><path fill="#f6f6f1" d="M0 0h1200v720H0z"/><path fill="#e8e4da" d="M0 0h1200v110H0z"/><text x="50" y="48" fill="#0d0d0d" font-size="12" font-weight="700" letter-spacing="2.4">PIPEROCKET DIGITAL · B2B PPC FOUNDATIONS</text><text x="50" y="85" fill="#0d0d0d" font-size="26" font-weight="700">ICP → Keyword → Campaign Mapping</text><path fill="#0cc6f1" d="M0 110h1200v4H0z"/><text x="50" y="148" fill="#282828" font-size="14">The mapping every B2B PPC program needs before launching a single campaign.</text><g transform="translate(50 195)"><rect width="350" height="60" fill="#0cc6f1" rx="10"/><text x="22" y="28" fill="rgba(13, 13, 13, 0.8)" font-size="11" font-weight="700" letter-spacing="2">COLUMN 1</text><text x="22" y="48" fill="#0d0d0d" font-size="18" font-weight="700">Define ICP</text></g><g transform="translate(425 195)"><rect width="350" height="60" fill="#0cc6f1" rx="10"/><text x="22" y="28" fill="rgba(13, 13, 13, 0.8)" font-size="11" font-weight="700" letter-spacing="2">COLUMN 2</text><text x="22" y="48" fill="#0d0d0d" font-size="18" font-weight="700">Classify Keyword Intent</text></g><g transform="translate(800 195)"><rect width="350" height="60" fill="#0cc6f1" rx="10"/><text x="22" y="28" fill="rgba(13, 13, 13, 0.8)" font-size="11" font-weight="700" letter-spacing="2">COLUMN 3</text><text x="22" y="48" fill="#0d0d0d" font-size="18" font-weight="700">Build the Campaign</text></g><g transform="translate(50 270)"><rect width="350" height="120" fill="#fff" stroke="#d9d5c9" rx="10"/><text x="22" y="32" fill="#6b6b6b" font-size="10" font-weight="700" letter-spacing="1.5">ICP A</text><text x="22" y="56" fill="#282828" font-size="15" font-weight="700">VP Marketing · Series B SaaS</text><text x="22" y="80" fill="#1a1a1a" font-size="12">100-500 employees · $5M-$50M ARR</text><text x="22" y="100" fill="#1a1a1a" font-size="12">Champion + 2-3 reviewers</text></g><path stroke="#282828" stroke-width="2" d="M403 320h20"/><path fill="#282828" d="m418 315 7 5-7 5z"/><g transform="translate(425 270)"><rect width="350" height="120" fill="#fff" stroke="#d9d5c9" rx="10"/><text x="22" y="32" fill="#6b6b6b" font-size="10" font-weight="700" letter-spacing="1.5">DECISION-STAGE</text><text x="22" y="56" fill="#282828" font-size="15" font-weight="700">&quot;[competitor] alternatives&quot;</text><text x="22" y="78" fill="#282828" font-size="15" font-weight="700">&quot;[competitor] pricing&quot;</text><text x="22" y="100" fill="#3f3f3f" font-size="12" font-style="italic">High-intent, evaluating now</text></g><path stroke="#282828" stroke-width="2" d="M778 320h20"/><path fill="#282828" d="m793 315 7 5-7 5z"/><g transform="translate(800 270)"><rect width="350" height="120" fill="#e8e4da" stroke="#0cc6f1" stroke-width="1.5" rx="10"/><text x="22" y="32" fill="#0cc6f1" font-size="10" font-weight="700" letter-spacing="1.5">CAMPAIGN</text><text x="22" y="56" fill="#0d0d0d" font-size="15" font-weight="700">Competitor / Alts</text><text x="22" y="80" fill="rgba(13, 13, 13, 0.85)" font-size="12">LP: comparison page</text><text x="22" y="100" fill="rgba(13, 13, 13, 0.85)" font-size="12">Goal: demo request · CRM-attributed</text></g><g transform="translate(50 410)"><rect width="350" height="120" fill="#fff" stroke="#d9d5c9" rx="10"/><text x="22" y="32" fill="#6b6b6b" font-size="10" font-weight="700" letter-spacing="1.5">ICP B</text><text x="22" y="56" fill="#282828" font-size="15" font-weight="700">Director RevOps · Enterprise</text><text x="22" y="80" fill="#1a1a1a" font-size="12">500-5,000 employees</text><text x="22" y="100" fill="#1a1a1a" font-size="12">Buying committee of 5-8</text></g><path stroke="#282828" stroke-width="2" d="M403 460h20"/><path fill="#282828" d="m418 455 7 5-7 5z"/><g transform="translate(425 410)"><rect width="350" height="120" fill="#fff" stroke="#d9d5c9" rx="10"/><text x="22" y="32" fill="#6b6b6b" font-size="10" font-weight="700" letter-spacing="1.5">CONSIDERATION-STAGE</text><text x="22" y="56" fill="#282828" font-size="15" font-weight="700">&quot;best [category] software&quot;</text><text x="22" y="78" fill="#282828" font-size="15" font-weight="700">&quot;[category] for enterprise&quot;</text><text x="22" y="100" fill="#3f3f3f" font-size="12" font-style="italic">Researching, not yet ready to buy</text></g><path stroke="#282828" stroke-width="2" d="M778 460h20"/><path fill="#282828" d="m793 455 7 5-7 5z"/><g transform="translate(800 410)"><rect width="350" height="120" fill="#0cc6f1" rx="10"/><text x="22" y="32" fill="rgba(13, 13, 13, 0.85)" font-size="10" font-weight="700" letter-spacing="1.5">CAMPAIGN</text><text x="22" y="56" fill="#0d0d0d" font-size="15" font-weight="700">Non-Brand / Category</text><text x="22" y="80" fill="rgba(13, 13, 13, 0.95)" font-size="12">LP: solution-overview page</text><text x="22" y="100" fill="rgba(13, 13, 13, 0.95)" font-size="12">Goal: report download → nurture</text></g><g transform="translate(50 550)"><rect width="350" height="120" fill="#fff" stroke="#d9d5c9" rx="10"/><text x="22" y="32" fill="#6b6b6b" font-size="10" font-weight="700" letter-spacing="1.5">ICP C</text><text x="22" y="56" fill="#282828" font-size="15" font-weight="700">Practitioner · Any size</text><text x="22" y="80" fill="#1a1a1a" font-size="12">Self-serve · individual signup</text><text x="22" y="100" fill="#1a1a1a" font-size="12">Wants to try before buying</text></g><path stroke="#282828" stroke-width="2" d="M403 600h20"/><path fill="#282828" d="m418 595 7 5-7 5z"/><g transform="translate(425 550)"><rect width="350" height="120" fill="#fff" stroke="#d9d5c9" rx="10"/><text x="22" y="32" fill="#6b6b6b" font-size="10" font-weight="700" letter-spacing="1.5">BRANDED-STAGE</text><text x="22" y="56" fill="#282828" font-size="15" font-weight="700">&quot;[your brand]&quot;</text><text x="22" y="78" fill="#282828" font-size="15" font-weight="700">&quot;[your brand] pricing&quot;</text><text x="22" y="100" fill="#3f3f3f" font-size="12" font-style="italic">Already convinced — protect the click</text></g><path stroke="#282828" stroke-width="2" d="M778 600h20"/><path fill="#282828" d="m793 595 7 5-7 5z"/><g transform="translate(800 550)"><rect width="350" height="120" fill="#fff" stroke="#0cc6f1" stroke-width="2" rx="10"/><text x="22" y="32" fill="#0cc6f1" font-size="10" font-weight="700" letter-spacing="1.5">CAMPAIGN</text><text x="22" y="56" fill="#282828" font-size="15" font-weight="700">Brand Defense</text><text x="22" y="80" fill="#1a1a1a" font-size="12">LP: pricing or product page</text><text x="22" y="100" fill="#1a1a1a" font-size="12">Goal: free trial · lowest CAC line item</text></g><text x="1150" y="698" fill="rgba(40,40,40,0.5)" font-size="11" text-anchor="end">piperocket.digital · ICP → Keyword → Campaign</text></svg>