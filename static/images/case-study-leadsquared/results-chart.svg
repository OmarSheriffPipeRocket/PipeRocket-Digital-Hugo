<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="100%" role="img" aria-label="Line chart showing LeadSquared conversion rates over four quarters. Lead-to-SAL rises from 18.9 percent in Q1 to 35.9 percent in Q4, dipping to 13.5 percent in Q3. SAL-to-SQL stays around 40 percent and ends at 47.4 percent in Q4.">
  <title>LeadSquared: lead quality improved across four quarters</title>
  <desc>Lead-to-SAL conversion: Q1 18.9%, Q2 21.1%, Q3 13.5%, Q4 35.9%. SAL-to-SQL conversion: Q1 42.9%, Q2 39.1%, Q3 38.5%, Q4 47.4%. Both peak in Q4 after a Q3 trough.</desc>

  <!-- gridlines + y axis (%) labels -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#9aa0a6">
    <line x1="110" y1="330" x2="650" y2="330" stroke="#ede9e2" stroke-width="1"/>
    <line x1="110" y1="272" x2="650" y2="272" stroke="#f3f1ec" stroke-width="1"/>
    <line x1="110" y1="214" x2="650" y2="214" stroke="#f3f1ec" stroke-width="1"/>
    <line x1="110" y1="156" x2="650" y2="156" stroke="#f3f1ec" stroke-width="1"/>
    <line x1="110" y1="98" x2="650" y2="98" stroke="#f3f1ec" stroke-width="1"/>
    <line x1="110" y1="40" x2="650" y2="40" stroke="#f3f1ec" stroke-width="1"/>
    <text x="100" y="334" text-anchor="end">0%</text>
    <text x="100" y="276" text-anchor="end">10%</text>
    <text x="100" y="218" text-anchor="end">20%</text>
    <text x="100" y="160" text-anchor="end">30%</text>
    <text x="100" y="102" text-anchor="end">40%</text>
    <text x="100" y="44" text-anchor="end">50%</text>
  </g>

  <!-- x labels -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#020617" text-anchor="middle">
    <text x="110" y="352">Q1</text>
    <text x="290" y="352">Q2</text>
    <text x="470" y="352">Q3</text>
    <text x="650" y="352">Q4</text>
  </g>

  <!-- SAL -> SQL line (red, dashed) -->
  <polyline points="110,81.4 290,103.1 470,106.9 650,55.3" fill="none" stroke="#D2493B" stroke-width="3" stroke-dasharray="7 5" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#D2493B">
    <rect x="106" y="77.4" width="8" height="8" transform="rotate(45 110 81.4)"/>
    <rect x="286" y="99.1" width="8" height="8" transform="rotate(45 290 103.1)"/>
    <rect x="466" y="102.9" width="8" height="8" transform="rotate(45 470 106.9)"/>
    <rect x="646" y="51.3" width="8" height="8" transform="rotate(45 650 55.3)"/>
  </g>

  <!-- Lead -> SAL line (blue, solid) -->
  <polyline points="110,220.3 290,207.6 470,251.5 650,122.1" fill="none" stroke="#2F6FD0" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#2F6FD0">
    <circle cx="110" cy="220.3" r="4.5"/>
    <circle cx="290" cy="207.6" r="4.5"/>
    <circle cx="470" cy="251.5" r="4.5"/>
    <circle cx="650" cy="122.1" r="4.5"/>
  </g>

  <!-- legend -->
  <g font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#3c4043">
    <line x1="180" y1="395" x2="208" y2="395" stroke="#2F6FD0" stroke-width="3"/>
    <text x="216" y="399">Lead → SAL conversion</text>
    <line x1="410" y1="395" x2="438" y2="395" stroke="#D2493B" stroke-width="3" stroke-dasharray="7 5"/>
    <text x="446" y="399">SAL → SQL conversion</text>
  </g>
</svg>
