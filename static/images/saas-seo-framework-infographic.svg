<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="prFwTitle prFwDesc">
  <title id="prFwTitle">PipeRocket SaaS SEO framework</title>
  <desc id="prFwDesc">Four-stage framework: buyers over keywords, intent over volume, purpose over publish, revenue over rankings. Sales calls and ICP data go in, demos, MQLs and MRR come out.</desc>

  <!-- stage 1: BUYERS over keywords -->
  <g text-anchor="middle">
    <text x="165" y="78" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#0CC6F1">01</text>
    <text x="165" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0D0D0D">Buyers</text>
    <text x="165" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#6B6B6B">over <tspan id="s1">keywords</tspan></text>
    <line x1="150" y1="157" x2="218" y2="154" stroke="#E63946" stroke-width="2" stroke-linecap="round"/>
    <text x="165" y="200" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6B6B6B">Sales calls + ICP data go in</text>
  </g>

  <!-- arrow 1 -->
  <g fill="none" stroke="#0D0D0D" stroke-width="2" stroke-linecap="round">
    <path d="M 292 118 q 38 -16 74 -2"/>
    <path d="M 366 116 l -11 -7"/>
    <path d="M 366 116 l -12 5"/>
  </g>

  <!-- stage 2: INTENT over volume -->
  <g text-anchor="middle">
    <text x="455" y="78" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#0CC6F1">02</text>
    <text x="455" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0D0D0D">Intent</text>
    <text x="455" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#6B6B6B">over <tspan>volume</tspan></text>
    <line x1="447" y1="157" x2="502" y2="154" stroke="#E63946" stroke-width="2" stroke-linecap="round"/>
    <text x="455" y="200" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6B6B6B">In-market, BOFU queries</text>
  </g>

  <!-- arrow 2 -->
  <g fill="none" stroke="#0D0D0D" stroke-width="2" stroke-linecap="round">
    <path d="M 578 118 q 34 -16 64 -2"/>
    <path d="M 642 116 l -11 -7"/>
    <path d="M 642 116 l -12 5"/>
  </g>

  <!-- stage 3: PURPOSE over publish -->
  <g text-anchor="middle">
    <text x="745" y="78" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#0CC6F1">03</text>
    <text x="745" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0D0D0D">Purpose</text>
    <text x="745" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#6B6B6B">over <tspan>publish</tspan></text>
    <line x1="737" y1="157" x2="794" y2="154" stroke="#E63946" stroke-width="2" stroke-linecap="round"/>
    <text x="745" y="200" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6B6B6B">Pages engineered to convert</text>
  </g>

  <!-- arrow 3 -->
  <g fill="none" stroke="#0D0D0D" stroke-width="2" stroke-linecap="round">
    <path d="M 866 118 q 34 -16 64 -2"/>
    <path d="M 930 116 l -11 -7"/>
    <path d="M 930 116 l -12 5"/>
  </g>

  <!-- stage 4: REVENUE over rankings -->
  <g text-anchor="middle">
    <text x="1035" y="78" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#0CC6F1">04</text>
    <text x="1035" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0D0D0D">Revenue</text>
    <!-- red hand-drawn underline scribble -->
    <path d="M 950 140 q 42 8 170 1" fill="none" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>
    <path d="M 958 145 q 60 6 152 0" fill="none" stroke="#E63946" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    <text x="1035" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#6B6B6B">over <tspan>rankings</tspan></text>
    <line x1="1025" y1="165" x2="1088" y2="162" stroke="#E63946" stroke-width="2" stroke-linecap="round"/>
    <text x="1035" y="206" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6B6B6B">Demos, MQLs, MRR out</text>
  </g>

  <!-- baseline dashed rail -->
  <line x1="60" y1="248" x2="1140" y2="248" stroke="#0D0D0D" stroke-width="1.5" stroke-dasharray="2 7" stroke-linecap="round" opacity="0.45"/>
  <text x="60" y="278" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="2" fill="#6B6B6B">WEEK ONE</text>
  <text x="1140" y="278" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="2" fill="#6B6B6B">COMPOUNDING MRR</text>
  <path d="M 1140 248 l -11 -7 M 1140 248 l -11 7" stroke="#0D0D0D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.45"/>
</svg>
