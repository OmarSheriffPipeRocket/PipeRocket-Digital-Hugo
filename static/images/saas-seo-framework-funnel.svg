<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 615" role="img" aria-labelledby="prFvTitle prFvDesc">
  <title id="prFvTitle">The PipeRocket SaaS SEO framework funnel</title>
  <desc id="prFvDesc">A 3D funnel. Search intent enters the wide top and narrows down through four stages to qualified pipeline and MRR. 01 Buyers over keywords: who buys and how they search comes first. 02 Intent over volume: decision-stage searches that convert in weeks. 03 Purpose over publish: high-converting pages shipped in month one. 04 Revenue over rankings: the CTA and MQL path is baked in before a word is written.</desc>

  <defs>
    <linearGradient id="prCone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D2D0C6"/>
      <stop offset="0.16" stop-color="#E9E7DF"/>
      <stop offset="0.5" stop-color="#F8F7F2"/>
      <stop offset="0.84" stop-color="#E9E7DF"/>
      <stop offset="1" stop-color="#CECCC2"/>
    </linearGradient>
    <linearGradient id="prConeRev" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9FD9EC"/>
      <stop offset="0.16" stop-color="#C7ECF7"/>
      <stop offset="0.5" stop-color="#E6F7FC"/>
      <stop offset="0.84" stop-color="#C7ECF7"/>
      <stop offset="1" stop-color="#9FD9EC"/>
    </linearGradient>
    <radialGradient id="prShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0D0D0D" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0D0D0D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- top label -->
  <text x="600" y="46" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="3" fill="#6B6B6B">SEARCH INTENT IN</text>

  <!-- ground shadow -->
  <ellipse cx="600" cy="544" rx="150" ry="18" fill="url(#prShadow)"/>

  <!-- rim opening -->
  <ellipse cx="600" cy="90" rx="290" ry="20" fill="#C7C5BB" stroke="#0D0D0D" stroke-width="2.4"/>

  <!-- funnel bands (3D frustums, flatter rings) -->
  <g stroke="#0D0D0D" stroke-width="1.7" stroke-linejoin="round">
    <path d="M 310 90 A 290 20 0 0 1 890 90 L 824 212 A 224 11 0 0 0 376 212 Z" fill="url(#prCone)"/>
    <path d="M 376 212 A 224 11 0 0 1 824 212 L 760 326 A 160 9 0 0 0 440 326 Z" fill="url(#prCone)"/>
    <path d="M 440 326 A 160 9 0 0 1 760 326 L 698 436 A 98 6 0 0 0 502 436 Z" fill="url(#prCone)"/>
    <path d="M 502 436 A 98 6 0 0 1 698 436 L 644 518 A 44 4 0 0 0 556 518 Z" fill="url(#prConeRev)"/>
  </g>
  <!-- spout opening -->
  <ellipse cx="600" cy="518" rx="44" ry="4" fill="#7FCBE4" stroke="#0D0D0D" stroke-width="1.4"/>

  <!-- in-funnel stage labels (centered in each band) -->
  <g text-anchor="middle">
    <!-- 01 Buyers (band center ~166) -->
    <text x="600" y="142" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">01</text>
    <text x="600" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#0D0D0D">Buyers</text>
    <text x="600" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#9a9a96">not <tspan fill="#6B6B6B">keywords</tspan></text>
    <line x1="591" y1="184" x2="632" y2="181.5" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 02 Intent (band center ~279) -->
    <text x="600" y="255" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">02</text>
    <text x="600" y="281" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#0D0D0D">Intent</text>
    <text x="600" y="301" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#9a9a96">not <tspan fill="#6B6B6B">volume</tspan></text>
    <line x1="593" y1="297" x2="631" y2="294.5" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 03 Purpose (band center ~388) -->
    <text x="600" y="364" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">03</text>
    <text x="600" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#0D0D0D">Purpose</text>
    <text x="600" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#9a9a96">not <tspan fill="#6B6B6B">publish</tspan></text>
    <line x1="589" y1="406" x2="630" y2="403.5" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 04 Revenue (band center ~482) -->
    <text x="600" y="458" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0CC6F1">04</text>
    <text x="600" y="484" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#0D0D0D">Revenue</text>
    <text x="600" y="503" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" font-style="italic" fill="#5b7a84">not <tspan fill="#3f5a63">rankings</tspan></text>
    <line x1="591" y1="499" x2="630" y2="496.5" stroke="#E63946" stroke-width="1.7" stroke-linecap="round"/>
  </g>

  <!-- alternating side callouts -->
  <g stroke="#6B6B6B" stroke-width="1.2" stroke-dasharray="3 4">
    <line x1="849" y1="166" x2="886" y2="166"/>
    <line x1="414" y1="279" x2="372" y2="279"/>
    <line x1="725" y1="388" x2="886" y2="388"/>
    <line x1="532" y1="482" x2="490" y2="482"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#0D0D0D">
    <text x="896" y="162">Who buys and how they</text>
    <text x="896" y="179">search comes first</text>
    <text x="362" y="275" text-anchor="end">Decision-stage searches</text>
    <text x="362" y="292" text-anchor="end">that convert in weeks</text>
    <text x="896" y="384">High-converting pages</text>
    <text x="896" y="401">shipped in month one</text>
    <text x="480" y="478" text-anchor="end">CTA + MQL path baked in</text>
    <text x="480" y="495" text-anchor="end">before a word is written</text>
  </g>

  <!-- spout to outcome -->
  <line x1="600" y1="522" x2="600" y2="552" stroke="#0D0D0D" stroke-width="1.6" opacity="0.55"/>
  <text x="600" y="576" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1" fill="#0D0D0D">QUALIFIED PIPELINE &amp; MRR</text>
  <path d="M 470 587 q 130 9 260 0" fill="none" stroke="#E63946" stroke-width="2.8" stroke-linecap="round"/>
</svg>
