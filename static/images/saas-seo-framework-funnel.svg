<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 420" role="img" aria-labelledby="prFfTitle prFfDesc">
  <title id="prFfTitle">PipeRocket SaaS SEO framework funnel</title>
  <desc id="prFfDesc">A funnel running from week one to compounding MRR through four stages: 01 Buyers over keywords (sales calls and ICP data go in), 02 Intent over volume (in-market BOFU queries), 03 Purpose over publish (pages built to convert), 04 Revenue over rankings (demos, MQLs and MRR out).</desc>

  <!-- funnel cone -->
  <g fill="none" stroke="#0D0D0D" stroke-width="2.5">
    <path d="M 150 50 C 470 64, 850 104, 1170 118"/>
    <path d="M 150 350 C 470 336, 850 296, 1170 282"/>
    <ellipse cx="150" cy="200" rx="22" ry="150"/>
    <ellipse cx="1170" cy="200" rx="9" ry="82"/>
  </g>

  <!-- segment dividers inside the cone -->
  <g stroke="#6B6B6B" stroke-width="1.2" stroke-dasharray="3 7" opacity="0.4">
    <line x1="465" y1="71" x2="465" y2="329"/>
    <line x1="700" y1="87" x2="700" y2="313"/>
    <line x1="940" y1="103" x2="940" y2="297"/>
  </g>

  <!-- flow arrows on the centerline -->
  <g fill="none" stroke="#0D0D0D" stroke-width="2" stroke-linecap="round">
    <path d="M 440 200 h 44"/><path d="M 484 200 l -10 -6 M 484 200 l -10 6"/>
    <path d="M 678 200 h 44"/><path d="M 722 200 l -10 -6 M 722 200 l -10 6"/>
    <path d="M 918 200 h 44"/><path d="M 962 200 l -10 -6 M 962 200 l -10 6"/>
  </g>

  <!-- ===== four stages ===== -->
  <g text-anchor="middle">
    <!-- 01 Buyers -->
    <text x="330" y="170" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#0CC6F1">01</text>
    <text x="330" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0D0D0D">Buyers</text>
    <text x="330" y="246" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#6B6B6B">over <tspan>keywords</tspan></text>
    <line x1="316" y1="240" x2="376" y2="237" stroke="#E63946" stroke-width="2.2" stroke-linecap="round"/>
    <text x="330" y="276" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">Sales calls + ICP data go in</text>

    <!-- 02 Intent -->
    <text x="585" y="170" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#0CC6F1">02</text>
    <text x="585" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0D0D0D">Intent</text>
    <text x="585" y="246" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#6B6B6B">over <tspan>volume</tspan></text>
    <line x1="573" y1="240" x2="623" y2="237" stroke="#E63946" stroke-width="2.2" stroke-linecap="round"/>
    <text x="585" y="276" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">In-market, BOFU queries</text>

    <!-- 03 Purpose -->
    <text x="830" y="170" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#0CC6F1">03</text>
    <text x="830" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0D0D0D">Purpose</text>
    <text x="830" y="246" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#6B6B6B">over <tspan>publish</tspan></text>
    <line x1="816" y1="240" x2="868" y2="237" stroke="#E63946" stroke-width="2.2" stroke-linecap="round"/>
    <text x="830" y="276" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">Pages built to convert</text>

    <!-- 04 Revenue -->
    <text x="1050" y="170" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#0CC6F1">04</text>
    <text x="1050" y="214" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0D0D0D">Revenue</text>
    <path d="M 968 224 q 84 9 170 1" fill="none" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>
    <path d="M 976 230 q 74 7 156 0" fill="none" stroke="#E63946" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <text x="1050" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#6B6B6B">over <tspan>rankings</tspan></text>
    <line x1="1036" y1="246" x2="1098" y2="243" stroke="#E63946" stroke-width="2.2" stroke-linecap="round"/>
    <text x="1050" y="278" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B6B6B">Demos, MQLs, MRR out</text>
  </g>

  <!-- WEEK ONE -> COMPOUNDING MRR rail -->
  <line x1="70" y1="384" x2="1218" y2="384" stroke="#0D0D0D" stroke-width="1.5" stroke-dasharray="2 7" stroke-linecap="round" opacity="0.45"/>
  <path d="M 1230 384 l -12 -6 M 1230 384 l -12 6" fill="none" stroke="#0D0D0D" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <text x="70" y="404" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="2.5" fill="#6B6B6B">WEEK ONE</text>
  <text x="1230" y="404" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" letter-spacing="2.5" fill="#6B6B6B">COMPOUNDING MRR</text>
</svg>
