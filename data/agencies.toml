# Per-agency page URLs used by the {{< agency-triptych >}} shortcode in
# listicle posts. Each agency entry is keyed by its /images/agencies/<slug>
# slug. Homepage + contact are required; pricing is optional (most B2B
# agencies don't publish dedicated pricing pages).
#
# Source pages were verified manually via WebFetch in May 2026. If you add
# a new agency, the matching screenshots must live at:
#   static/images/agencies/<slug>-home.webp
#   static/images/agencies/<slug>-pricing.webp   (only if pricing URL set)
#   static/images/agencies/<slug>-contact.webp
# Use scripts/capture_agency_pages.py to refresh.

