{{/* Positioning map for the best-ai-seo-agencies listicle.
     Inline SVG so axis + agency labels remain real, crawlable DOM text.
     Uses currentColor (adapts to light/dark) + brand red for the publisher. */}}
<figure class="pr-positioning-map" style="margin: var(--pr-s-6,2rem) 0; max-width: 820px;">
  <svg viewBox="0 0 800 480" width="100%" role="img"
       aria-label="Positioning map of 10 AI SEO agencies plotted by entry price (horizontal) and best-fit company stage from startup to enterprise (vertical). PipeRocket Digital sits in the startup-to-mid-market, lower-price quadrant alongside Embarque, while iPullRank, NoGood and Foundation Marketing occupy the premium enterprise quadrant."
       style="display:block; height:auto; font-family: inherit; color: var(--pr-ink, currentColor);">

    <!-- plot frame -->
    <g stroke="currentColor" stroke-width="1.5" opacity="0.35">
      <line x1="95" y1="55" x2="95" y2="408"/>
      <line x1="95" y1="408" x2="762" y2="408"/>
    </g>
    <!-- axis arrowheads -->
    <g fill="currentColor" opacity="0.35">
      <polygon points="95,49 91,59 99,59"/>
      <polygon points="768,408 758,404 758,412"/>
    </g>
    <!-- light gridlines -->
    <g stroke="currentColor" stroke-width="1" opacity="0.10">
      <line x1="230" y1="55" x2="230" y2="408"/>
      <line x1="365" y1="55" x2="365" y2="408"/>
      <line x1="500" y1="55" x2="500" y2="408"/>
      <line x1="635" y1="55" x2="635" y2="408"/>
      <line x1="95" y1="230" x2="762" y2="230"/>
    </g>

    <!-- axis labels -->
    <text x="428" y="448" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">Entry price &#8594;</text>
    <text x="150" y="468" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.7">Startup-friendly (~$1.5k)</text>
    <text x="690" y="468" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.7">Premium ($25k+)</text>
    <text transform="translate(38,232) rotate(-90)" text-anchor="middle" font-size="14" font-weight="600" fill="currentColor">Best-fit company stage &#8594;</text>
    <text transform="translate(58,388) rotate(-90)" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.7">Startup</text>
    <text transform="translate(58,95) rotate(-90)" text-anchor="middle" font-size="11" fill="currentColor" opacity="0.7">Enterprise</text>

    <!-- competitor dots -->
    <g fill="currentColor">
      <g opacity="0.6">
        <circle cx="150" cy="392" r="6"/>
        <circle cx="235" cy="300" r="6"/>
        <circle cx="300" cy="285" r="6"/>
        <circle cx="345" cy="250" r="6"/>
        <circle cx="360" cy="352" r="6"/>
        <circle cx="385" cy="320" r="6"/>
        <circle cx="490" cy="205" r="6"/>
        <circle cx="618" cy="150" r="6"/>
        <circle cx="655" cy="110" r="6"/>
      </g>
    </g>
    <!-- competitor labels -->
    <g font-size="12.5" fill="currentColor">
      <text x="162" y="396">Embarque</text>
      <text x="247" y="304">RevenueZen</text>
      <text x="312" y="289">Skale</text>
      <text x="357" y="246">SimpleTiger</text>
      <text x="372" y="356">MADX Digital</text>
      <text x="397" y="324">Omnius</text>
      <text x="502" y="209">Omniscient Digital</text>
      <text x="606" y="154" text-anchor="end">NoGood</text>
      <text x="643" y="114" text-anchor="end">iPullRank</text>
    </g>

    <!-- PipeRocket (publisher) highlighted -->
    <circle cx="165" cy="322" r="9" fill="var(--pr-red,#E63946)"/>
    <text x="181" y="327" font-size="13.5" font-weight="700" fill="var(--pr-red,#E63946)">PipeRocket Digital</text>

    <!-- legend -->
    <g transform="translate(560,452)">
      <circle cx="0" cy="-4" r="6" fill="var(--pr-red,#E63946)"/>
      <text x="12" y="0" font-size="11.5" fill="currentColor" opacity="0.85">PipeRocket Digital (publisher of this list)</text>
    </g>
  </svg>
  <figcaption style="font-size: 0.85rem; color: var(--pr-ink-2, #555); margin-top: var(--pr-s-3,0.75rem); text-align:center;">
    Where the 10 AI SEO agencies sit by entry price and best-fit company stage. Positions are indicative, based on each agency's published starting price and target client profile.
  </figcaption>
</figure>
