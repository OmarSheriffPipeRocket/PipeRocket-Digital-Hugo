{{/* Vintage TV testimonial carousel — embeds unlisted YouTube videos */}}
<div class="pr-working-tv-wrap">
  <div class="pr-tv" role="region" aria-label="Client testimonial videos">
    <div class="pr-tv__screen">
      <div class="pr-tv__slides">
        <button type="button" class="pr-tv__slide is-active" data-vid="sOghlvj-rFc" data-label="Goldcast" aria-label="Play Goldcast testimonial">
          <img loading="lazy" decoding="async" src="/images/tv-thumbs/sOghlvj-rFc.webp" alt="Goldcast testimonial thumbnail" width="960" height="540">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="vs79zJqzqoI" data-label="Spendflo" aria-label="Play Spendflo testimonial">
          <img loading="lazy" decoding="async" data-src="/images/tv-thumbs/vs79zJqzqoI.webp" alt="Spendflo testimonial thumbnail" width="960" height="540">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="SsDHIXQ5vzo" data-label="Digital API" aria-label="Play Digital API testimonial">
          <img loading="lazy" decoding="async" data-src="/images/tv-thumbs/SsDHIXQ5vzo.webp" alt="Digital API testimonial thumbnail" width="960" height="540">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="ymdaYW9eLhA" data-label="Astra" aria-label="Play Astra testimonial">
          <img loading="lazy" decoding="async" data-src="/images/tv-thumbs/ymdaYW9eLhA.webp" alt="Astra testimonial thumbnail" width="960" height="540">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="28S63tmwUgo" data-label="HyperVerge" aria-label="Play HyperVerge testimonial">
          <img loading="lazy" decoding="async" data-src="/images/tv-thumbs/28S63tmwUgo.webp" alt="HyperVerge testimonial thumbnail" width="960" height="540">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <img class="pr-tv__bezel" src="/images/tv-frame.webp" alt="" aria-hidden="true" width="1194" height="1156">
    <button type="button" class="pr-tv__nav pr-tv__nav--prev" aria-label="Previous testimonial"><svg width="40" height="80" viewBox="0 0 40 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M31.8267 21.9333L28.29 18.4L9.02671 37.6566C8.71619 37.9652 8.46977 38.3321 8.30161 38.7363C8.13345 39.1404 8.04687 39.5739 8.04687 40.0116C8.04687 40.4494 8.13345 40.8828 8.30161 41.287C8.46977 41.6912 8.71619 42.0581 9.02671 42.3666L28.29 61.6333L31.8234 58.1L13.7434 40.0166L31.8267 21.9333Z" fill="currentColor"/></svg></button>
    <button type="button" class="pr-tv__nav pr-tv__nav--next" aria-label="Next testimonial"><svg width="40" height="80" viewBox="0 0 40 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="transform:scaleX(-1)"><path d="M31.8267 21.9333L28.29 18.4L9.02671 37.6566C8.71619 37.9652 8.46977 38.3321 8.30161 38.7363C8.13345 39.1404 8.04687 39.5739 8.04687 40.0116C8.04687 40.4494 8.13345 40.8828 8.30161 41.287C8.46977 41.6912 8.71619 42.0581 9.02671 42.3666L28.29 61.6333L31.8234 58.1L13.7434 40.0166L31.8267 21.9333Z" fill="currentColor"/></svg></button>
  </div>
  <div class="pr-tv__dots" role="tablist" aria-label="Choose testimonial">
    <button type="button" class="pr-tv__dot is-active" data-index="0" role="tab" aria-label="Goldcast"><span>Goldcast</span></button>
    <button type="button" class="pr-tv__dot" data-index="1" role="tab" aria-label="Spendflo"><span>Spendflo</span></button>
    <button type="button" class="pr-tv__dot" data-index="2" role="tab" aria-label="DAC"><span>DAC</span></button>
    <button type="button" class="pr-tv__dot" data-index="3" role="tab" aria-label="Astra"><span>Astra</span></button>
    <button type="button" class="pr-tv__dot" data-index="4" role="tab" aria-label="HyperVerge"><span>HyperVerge</span></button>
  </div>
</div>
<script>
(function(){
  var wrap = document.currentScript.previousElementSibling;
  if(!wrap) return;
  var slides = wrap.querySelectorAll('.pr-tv__slide');
  var dots = wrap.querySelectorAll('.pr-tv__dot');
  var prev = wrap.querySelector('.pr-tv__nav--prev');
  var next = wrap.querySelector('.pr-tv__nav--next');
  var slidesWrap = wrap.querySelector('.pr-tv__slides');
  var current = 0;

  function show(i){
    if(i < 0) i = slides.length - 1;
    if(i >= slides.length) i = 0;
    slides.forEach(function(s, idx){
      var active = idx === i;
      s.classList.toggle('is-active', active);
      if(active){
        var img = s.querySelector('img[data-src]');
        if(img){ img.src = img.getAttribute('data-src'); img.removeAttribute('data-src'); }
      }
      // Tear down any iframe that isn't the active slide
      if(!active){
        var f = s.querySelector('iframe');
        if(f) f.remove();
        var img = s.querySelector('img');
        var play = s.querySelector('.pr-tv__play');
        if(img) img.style.display = '';
        if(play) play.style.display = '';
      }
    });
    dots.forEach(function(d, idx){ d.classList.toggle('is-active', idx === i); });
    current = i;
  }

  function play(slide){
    if(slide.querySelector('iframe')) return;
    var vid = slide.getAttribute('data-vid');
    // Click-initiated playback: unmuted (with sound) and with native controls.
    // Built synchronously so it stays inside the user-gesture that allows audio.
    var iframe = document.createElement('iframe');
    iframe.src = 'https://www.youtube-nocookie.com/embed/' + vid + '?autoplay=1&mute=0&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&controls=1';
    iframe.title = slide.getAttribute('data-label') + ' testimonial';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.setAttribute('allowfullscreen', '');
    iframe.loading = 'lazy';
    var img = slide.querySelector('img');
    var pl = slide.querySelector('.pr-tv__play');
    if(img) img.style.display = 'none';
    if(pl) pl.style.display = 'none';
    slide.appendChild(iframe);
  }

  slides.forEach(function(s, i){
    s.addEventListener('click', function(){
      if(i !== current){ show(i); }
      play(s);
    });
  });
  dots.forEach(function(d, i){
    d.addEventListener('click', function(){ show(i); play(slides[i]); });
  });
  if(prev) prev.addEventListener('click', function(){ var t = current - 1; if(t < 0) t = slides.length - 1; show(t); play(slides[t]); });
  if(next) next.addEventListener('click', function(){ var t = current + 1; if(t >= slides.length) t = 0; show(t); play(slides[t]); });

  // No autoplay: the video plays only when the user clicks. Tear down the iframe
  // when the TV scrolls (mostly) out of view so its audio never keeps playing
  // off-screen. (Removing the iframe is a guaranteed stop, no race with the API.)
  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      var entry = entries[0];
      if(!entry.isIntersecting){
        slides.forEach(function(s){
          var f = s.querySelector('iframe');
          if(f) f.remove();
          var img = s.querySelector('img');
          var pl = s.querySelector('.pr-tv__play');
          if(img) img.style.display = '';
          if(pl) pl.style.display = '';
        });
      }
    }, { threshold: 0.1 });
    io.observe(wrap);
  }
})();
</script>
