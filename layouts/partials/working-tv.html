{{/* Vintage TV testimonial carousel — embeds unlisted YouTube videos */}}
<div class="pr-working-tv-wrap">
  <div class="pr-tv" role="region" aria-label="Client testimonial videos">
    <div class="pr-tv__screen">
      <div class="pr-tv__slides">
        <button type="button" class="pr-tv__slide is-active" data-vid="mUf7jF3uu4w" data-label="Goldcast" aria-label="Play Goldcast testimonial">
          <img loading="lazy" decoding="async" src="https://i.ytimg.com/vi/mUf7jF3uu4w/maxresdefault.jpg" alt="Goldcast testimonial thumbnail">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="OJjzU0aLddk" data-label="Spendflo" aria-label="Play Spendflo testimonial">
          <img loading="lazy" decoding="async" data-src="https://i.ytimg.com/vi/OJjzU0aLddk/maxresdefault.jpg" alt="Spendflo testimonial thumbnail">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="n2DOXO--UHQ" data-label="DAC" aria-label="Play DAC testimonial">
          <img loading="lazy" decoding="async" data-src="https://i.ytimg.com/vi/n2DOXO--UHQ/maxresdefault.jpg" alt="DAC testimonial thumbnail">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="6M3owWgFx_A" data-label="Astra" aria-label="Play Astra testimonial">
          <img loading="lazy" decoding="async" data-src="https://i.ytimg.com/vi/6M3owWgFx_A/maxresdefault.jpg" alt="Astra testimonial thumbnail">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
        <button type="button" class="pr-tv__slide" data-vid="3vjQoIREkKI" data-label="HyperVerge" aria-label="Play HyperVerge testimonial">
          <img loading="lazy" decoding="async" data-src="https://i.ytimg.com/vi/3vjQoIREkKI/maxresdefault.jpg" alt="HyperVerge testimonial thumbnail">
          <span class="pr-tv__play" aria-hidden="true"></span>
        </button>
      </div>
    </div>
    <img class="pr-tv__bezel" src="/images/tv-frame.webp" alt="" aria-hidden="true">
    <button type="button" class="pr-tv__nav pr-tv__nav--prev" aria-label="Previous testimonial">‹</button>
    <button type="button" class="pr-tv__nav pr-tv__nav--next" aria-label="Next testimonial">›</button>
  </div>
  <div class="pr-tv__dots" role="tablist" aria-label="Choose testimonial">
    <button type="button" class="pr-tv__dot is-active" data-index="0" role="tab" aria-label="Goldcast"><span>Goldcast</span></button>
    <button type="button" class="pr-tv__dot" data-index="1" role="tab" aria-label="Spendflo"><span>Spendflo</span></button>
    <button type="button" class="pr-tv__dot" data-index="2" role="tab" aria-label="DAC"><span>DAC</span></button>
    <button type="button" class="pr-tv__dot" data-index="3" role="tab" aria-label="Astra"><span>Astra</span></button>
    <button type="button" class="pr-tv__dot" data-index="4" role="tab" aria-label="HyperVerge"><span>HyperVerge</span></button>
  </div>
</div>
<script>
(function(){
  var wrap = document.currentScript.previousElementSibling;
  if(!wrap) return;
  var slides = wrap.querySelectorAll('.pr-tv__slide');
  var dots = wrap.querySelectorAll('.pr-tv__dot');
  var prev = wrap.querySelector('.pr-tv__nav--prev');
  var next = wrap.querySelector('.pr-tv__nav--next');
  var slidesWrap = wrap.querySelector('.pr-tv__slides');
  var current = 0;

  function show(i){
    if(i < 0) i = slides.length - 1;
    if(i >= slides.length) i = 0;
    slides.forEach(function(s, idx){
      var active = idx === i;
      s.classList.toggle('is-active', active);
      if(active){
        var img = s.querySelector('img[data-src]');
        if(img){ img.src = img.getAttribute('data-src'); img.removeAttribute('data-src'); }
      }
      // Tear down any iframe that isn't the active slide
      if(!active){
        var f = s.querySelector('iframe');
        if(f) f.remove();
        var img = s.querySelector('img');
        var play = s.querySelector('.pr-tv__play');
        if(img) img.style.display = '';
        if(play) play.style.display = '';
      }
    });
    dots.forEach(function(d, idx){ d.classList.toggle('is-active', idx === i); });
    current = i;
  }

  function play(slide){
    if(slide.querySelector('iframe')) return;
    var vid = slide.getAttribute('data-vid');
    var iframe = document.createElement('iframe');
    iframe.src = 'https://www.youtube-nocookie.com/embed/' + vid + '?autoplay=1&rel=0&modestbranding=1&playsinline=1';
    iframe.title = slide.getAttribute('data-label') + ' testimonial';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.setAttribute('allowfullscreen', '');
    iframe.loading = 'lazy';
    var img = slide.querySelector('img');
    var pl = slide.querySelector('.pr-tv__play');
    if(img) img.style.display = 'none';
    if(pl) pl.style.display = 'none';
    slide.appendChild(iframe);
  }

  slides.forEach(function(s, i){
    s.addEventListener('click', function(){
      if(i !== current){ show(i); }
      play(s);
    });
  });
  dots.forEach(function(d, i){
    d.addEventListener('click', function(){ show(i); });
  });
  if(prev) prev.addEventListener('click', function(){ show(current - 1); });
  if(next) next.addEventListener('click', function(){ show(current + 1); });
})();
</script>
