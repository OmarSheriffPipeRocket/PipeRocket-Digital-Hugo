<header class="pr-header">
  <div class="pr-container pr-header__inner">
    <a href="/" class="pr-logo" aria-label="PipeRocket home">
      <img src="/images/piperocket-logo.svg" alt="PipeRocket" class="pr-logo__img">
    </a>

    <nav class="pr-nav" aria-label="Main">
      <div class="pr-nav__item pr-nav__item--drop" tabindex="0">
        <span>Services</span>
        <img src="/images/dropdown-arrow.svg" alt="" aria-hidden="true" class="pr-nav__caret">
        <div class="pr-dropmenu" role="menu">
          <a href="/saas-seo-agency/" class="pr-dropmenu__link{{ if eq .RelPermalink "/saas-seo-agency/" }} is-active{{ end }}">SaaS SEO</a>
          <a href="/saas-ppc/" class="pr-dropmenu__link{{ if eq .RelPermalink "/saas-ppc/" }} is-active{{ end }}">SaaS PPC</a>
        </div>
      </div>

      <div class="pr-nav__item pr-nav__item--drop" tabindex="0">
        <span>Resources</span>
        <img src="/images/dropdown-arrow.svg" alt="" aria-hidden="true" class="pr-nav__caret">
        <div class="pr-dropmenu" role="menu">
          <a href="/blogs/" class="pr-dropmenu__link">Blogs</a>
        </div>
      </div>

      <a href="/success-stories/" class="pr-nav__item">Success Stories</a>
      <a href="/about-us/" class="pr-nav__item">About</a>
    </nav>

    <div class="pr-header__cta">
      <a href="{{ .Site.Params.primary_cta_url | relURL }}" class="pr-btn" data-cta-location="nav">{{ .Site.Params.primary_cta_text }}</a>
    </div>

    <button class="pr-menu-toggle" aria-label="Open menu" id="prMenuToggle">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

{{ partial "modal-funnel-audit.html" . }}
