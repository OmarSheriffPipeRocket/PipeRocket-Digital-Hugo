{{/* Reusable directory-page hero — used on /blogs/, /list/, /glossary/, /alternative/, /compare/, /vs/.
     Pass: title, lede, ctaId  (e.g. dict "title" "X" "lede" "Y" "ctaId" "compare-hero-subscribe") */}}
<section class="pr-section pr-blog-hero">
  <div class="pr-container">
    <div class="pr-blog-hero__grid">
      <div class="pr-blog-hero__copy">
        <h1 class="pr-blog-hero__title">{{ .title }}</h1>
        <p class="pr-blog-hero__lede">{{ .lede }}</p>

        <form
          class="pr-blog-hero__form"
          name="blog-subscribe"
          method="POST"
          data-netlify="true"
          netlify-honeypot="bot-field"
          data-cta-location="{{ .ctaId }}">
          <input type="hidden" name="form-name" value="blog-subscribe">
          <p class="pr-subscribe__hp" hidden aria-hidden="true">
            <label>Don't fill this out: <input name="bot-field"></label>
          </p>
          <label class="pr-blog-hero__field">
            <span class="pr-visually-hidden">Email address</span>
            <input type="email" name="email" required autocomplete="email"
              placeholder="email@company.com" class="pr-blog-hero__input">
          </label>
          <button type="submit" class="pr-btn pr-blog-hero__btn">Subscribe</button>
        </form>
      </div>

      <div class="pr-blog-hero__art" aria-hidden="true">
        <img class="pr-blog-hero__spin" src="/images/blog-hero/spin.svg" alt="">
        <video class="pr-blog-hero__book" autoplay loop muted playsinline preload="auto">
          <source src="/images/blog-hero/book.webm" type="video/webm">
        </video>
        <img class="pr-blog-hero__vectors" src="/images/blog-hero/book-vectors.svg" alt="">
        <img class="pr-blog-hero__woman" src="/images/blog-hero/woman.png" alt="">
      </div>
    </div>
  </div>
</section>
