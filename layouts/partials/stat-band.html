{{/* Dark stat band — used on homepage and service pages */}}
<section class="pr-stat-band">
  <div class="pr-container pr-center">
    <h2 class="pr-stat-band__heading">Numbers that matter</h2>
    <div class="pr-stat-band__row">
      <div class="pr-stat-band__item">
        <div class="pr-stat-band__gif-box">
          <img src="/images/stat-customers.webp" alt="Customers" class="pr-stat-band__gif" loading="lazy" decoding="async">
          <div class="pr-stat-band__label">CUSTOMERS</div>
        </div>
      </div>
      <div class="pr-stat-band__item">
        <div class="pr-stat-band__gif-box">
          <img src="/images/stat-pipeline.webp" alt="Pipeline" class="pr-stat-band__gif" loading="lazy" decoding="async">
          <div class="pr-stat-band__label">PIPELINE</div>
        </div>
      </div>
      <div class="pr-stat-band__item">
        <div class="pr-stat-band__gif-box">
          <img src="/images/stat-traffic.webp" alt="Traffic" class="pr-stat-band__gif" loading="lazy" decoding="async">
          <div class="pr-stat-band__label">TRAFFIC</div>
        </div>
      </div>
      <div class="pr-stat-band__item">
        <div class="pr-stat-band__gif-box">
          <img src="/images/stat-spend.webp" alt="Spend" class="pr-stat-band__gif" loading="lazy" decoding="async">
          <div class="pr-stat-band__label">SPEND</div>
        </div>
      </div>
    </div>
  </div>
</section>
