[build]
  publish = "public"
  # Hugo first, then PurgeCSS rewrites the fingerprinted main.min.<hash>.css
  # in place to strip selectors no rendered page actually uses.
  command = "hugo --baseURL $URL && npx purgecss --config ./purgecss.config.js"

[build.environment]
  HUGO_VERSION = "0.161.1"
  HUGO_ENVIRONMENT = "production"
  TZ = "Asia/Kolkata"

# ─── Lighthouse perf monitoring on every production deploy ─────────────
# Surfaces Performance / Accessibility / Best-Practices / SEO scores in
# the Netlify deploy log so we catch regressions early.
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "reports/lighthouse.html"

  [[plugins.inputs.audits]]
    path = ""
    url = "https://piperocket.digital/"

# Production builds (main branch) — use canonical site URL.
# Hugo bakes baseURL into <link>, <img>, sitemap.xml, etc., so internal
# navigation should always go to piperocketdigital.netlify.app, not the
# branch-aliased main--piperocketdigital.netlify.app URL.
[context.production]
  command = "hugo --baseURL $URL && npx purgecss --config ./purgecss.config.js"

# Deploy previews (PRs) — use the unique preview URL so internal links
# stay within the preview when reviewing changes.
[context.deploy-preview]
  command = "hugo --baseURL $DEPLOY_PRIME_URL && npx purgecss --config ./purgecss.config.js"

# Branch deploys (any non-main branch with branch deploys enabled) —
# use the unique branch URL.
[context.branch-deploy]
  command = "hugo --baseURL $DEPLOY_PRIME_URL && npx purgecss --config ./purgecss.config.js"

# ─── Cache-Control headers ─────────────────────────────────────────────
# Hugo fingerprints CSS+JS in the filename (e.g. main.min.<hash>.css), so the
# URL changes when content changes — safe to cache for a year as immutable.
# Fonts live at stable URLs and rarely change — same treatment.
# Images are kept on a short cache during the migration cutover because we may
# still be replacing assets at stable paths; bump this once content settles.

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
