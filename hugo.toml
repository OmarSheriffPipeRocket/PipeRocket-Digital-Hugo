######################## PipeRocket Hugo Config ####################
baseURL = "https://piperocket.digital/"
languageCode = "en-us"
title = "PipeRocket — Marketing with purpose, not just presence."
canonifyURLs = false
relativeURLs = false
timeZone = "Asia/Kolkata"
hasCJKLanguage = false

# Pretty URLs (trailing slash)
uglyURLs = false

# Pagination
pagination.pagerSize = 12

# Build settings
[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = '(js|scripts|javascript)'
[[build.cachebusters]]
source = 'assets/.*\.(css|sass|scss)$'
target = '(css|styles|scss|sass)'

# Outputs
[outputs]
home = ["HTML", "RSS", "SITEMAP"]
section = ["HTML", "RSS"]

# Imaging
[imaging]
quality = 85
resampleFilter = "lanczos"

# Caches
[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

# Markup — allow raw HTML in markdown
[markup]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
noClasses = false

# Permalinks — case studies use flat URL pattern from existing site
[permalinks]
case-study = "/case-study-:slug/"

# Taxonomies — keep minimal for now
[taxonomies]
category = "categories"
tag = "tags"

