############################# Site Params ##############################
[params]
description = "PipeRocket is a B2B SaaS marketing agency obsessed with one thing: your revenue. SaaS SEO, SaaS PPC, MarOps."
author = "PipeRocket Digital"
tagline = "Marketing with purpose, not just presence."
copyright = "© PipeRocket Inc. 2026 All rights reserved"

primary_cta_text = "Talk to Us"
primary_cta_url = "/contact-us/"

# Analytics — only injected in production builds (`hugo --environment production`
# or Netlify's [context.production] block). Local hugo server / preview
# deploys never load these snippets, so dev traffic stays out of reports.
#
# Strategy: use GTM as the single container so anything else the marketing
# team adds (LinkedIn Insight, HubSpot, FB Pixel, HotJar, etc.) plugs into
# the GTM container without code changes. GA4 is wired *inside* GTM, not
# directly here.
gtm_container_id = "GTM-W8SRLKQT"
# HubSpot Hub ID — loaded as a direct <script> tag (mirroring the live
# WP setup, where HubSpot is loaded outside GTM, not inside it). This
# preserves HubSpot's CRM contact tracking, chat widget, lifecycle
# email triggers, and form attribution through the cutover.
hubspot_hub_id = "241952717"
# Kept for reference — GA4 is actually loaded by the GTM container above.
# If you ever want to fall back to direct gtag, set ga4_measurement_id
# AND remove gtm_container_id.
# ga4_measurement_id = "G-RZ1XZF24RE"

# Google Search Console — preserve all 3 verifications across the WP→Hugo
# cutover so no GSC property loses access. The HTML-file verification lives
# at /google117f954682949a70.html (see static/).
gsc_verifications = [
  "35sx_ohg4CVnedHcqmFWOdPnVDgd2UOSFlSCHPQwrUc",
  "_g31ybIIcWEPUvuVu43mkjfsSnfYtZliuR1M1ZAehUM",
]
secondary_cta_text = "Book free consultation"
secondary_cta_url = "/contact-us/"

[params.social]
linkedin = "https://www.linkedin.com/company/piperocketdigital/"
twitter = "https://x.com/piperocket"
clutch_rating = "5.0"

# HubSpot form embed (used by /contact-us/). Replace these with your actual
# HubSpot portal ID and form ID from the HubSpot Forms dashboard.
[params.hubspot]
portal_id = "241952717"
form_id = "13586672-6366-4216-9e7b-b49c35aa1a32"
region = "na2"

[params.contact]
email = "piperocketmarketing@gmail.com"
phone = "+91 88702 45547"
address = "Chennai, India · US delivery hub"
office_us = "New York, USA"

# Numbers that matter — homepage stats strip. Each entry animates from 0 to `target` on scroll-in.
# Edit values here; layout renders from .Site.Params.stats.
[[params.stats]]
prefix = "$"
target = 4.5
decimals = 1
suffix = "M"
label = "Customers"
